{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
  <section class="auth-panel">
    <p class="eyebrow">Secure access</p>
    <h1>Login</h1>
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit">Log in</button>
    </form>
  </section>
{% endblock %}
