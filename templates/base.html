{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}UW Performance Eval{% endblock %}</title>
    <link rel="icon" href="{% static 'app/favicon.svg' %}" type="image/svg+xml">
    <link rel="stylesheet" href="{% static 'app/styles.css' %}">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="{% url 'dashboard' %}">UW Eval</a>
      {% if request.user.is_authenticated %}
        <nav class="user-nav">
          <span class="user-pill">{{ request.user.get_username }}</span>
          <form method="post" action="{% url 'logout' %}">
            {% csrf_token %}
            <button type="submit" class="link-button">Log out</button>
          </form>
        </nav>
      {% endif %}
    </header>
    <main>
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
